<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MolinaCapra · Sincronización con Google Sheets (JSONP)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #FEF9F0; }
        .bg-primary { background-color: #2B7A4B; }
        .text-primary { color: #2B7A4B; }
        .toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff;
            border-radius: 8px; padding: 16px; position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); opacity: 0; transition: opacity 0.5s; z-index: 1000;
        }
        .toast.show { visibility: visible; opacity: 1; }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="max-w-7xl mx-auto px-4 pb-20">
    <header class="py-4 flex flex-wrap justify-between border-b mb-6">
        <div class="flex items-center gap-2">
            <i class="fas fa-goat text-3xl text-[#2B7A4B]"></i>
            <h1 class="text-2xl font-poppins font-bold text-[#2B7A4B]">MolinaCapra</h1>
        </div>
        <nav class="flex gap-4">
            <button data-nav="home" class="nav-btn">Inicio</button>
            <button data-nav="herd" class="nav-btn">Rebaño</button>
            <button data-nav="genealogy" class="nav-btn">Genealogía</button>
            <button data-nav="notebook" class="nav-btn">Diario</button>
        </nav>
    </header>

    <main>
        <div id="view-home" class="view active">
            <div class="bg-gradient-to-r from-green-50 to-amber-50 rounded-2xl p-6 mb-8">
                <h2 class="text-2xl">🐐 Bienvenido, Álvaro</h2>
                <p>Rebaño: <span id="total-goats">0</span> cabras | Producción media: <span id="avg-milk">0</span> L/día</p>
                <button data-nav="herd" class="mt-3 bg-primary text-white px-4 py-2 rounded-full">+ Agregar cabra</button>
                <button id="syncBtn" class="mt-3 ml-2 border border-primary text-primary px-4 py-2 rounded-full"><i class="fas fa-cloud-upload-alt"></i> Sincronizar</button>
            </div>
        </div>
        <div id="view-herd" class="view hidden">
            <div class="flex justify-between mb-4"><h2 class="text-2xl">Mi rebaño</h2><button id="new-goat-btn" class="bg-primary text-white px-4 py-2 rounded-lg">+ Nueva cabra</button></div>
            <div id="herd-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
        <div id="view-genealogy" class="view hidden">
            <h2 class="text-2xl mb-2">Árbol genealógico</h2>
            <select id="genealogy-select" class="border p-2 rounded w-full md:w-64 mb-6"></select>
            <div id="tree-container" class="bg-white p-4 rounded shadow"></div>
            <div class="mt-8"><h3>Producción de queso</h3><div id="cheese-calc" class="bg-gray-50 p-3 rounded"></div></div>
        </div>
        <div id="view-notebook" class="view hidden">
            <h2 class="text-2xl mb-4">Cuaderno de campo</h2>
            <textarea id="learning-notes" rows="8" class="w-full border rounded p-4"></textarea>
            <button id="save-notes" class="mt-2 bg-primary text-white px-4 py-2 rounded">Guardar notas</button>
        </div>
    </main>
    <div class="text-center text-xs text-gray-400 mt-10">desarrollado por tu papá Gerard Sieveres · sincronización con Google Sheets (JSONP)</div>
</div>

<script>
    // ===== CONFIGURACIÓN =====
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6aU799kyVPaOrdN89QfXmnq29niSUvnvgoBhNv-6hR2jvq9sIp4A2YyA5HqZAsqjs4g/exec"; // <-- REEMPLAZA
    let goats = [];
    let diaryNotes = "";

    function showToast(msg, isErr) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.style.backgroundColor = isErr ? "#cc3300" : "#2B7A4B";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    // Carga con JSONP (sin CORS)
    function loadFromCloud() {
        return new Promise((resolve, reject) => {
            const callbackName = "jsonp_" + Date.now() + "_" + Math.random().toString(36);
            window[callbackName] = function(data) {
                delete window[callbackName];
                if (data.success) {
                    goats = data.goats || [];
                    diaryNotes = data.notas || "";
                    saveToLocal();
                    refreshUI();
                    showToast("📥 Datos cargados desde la nube", false);
                    resolve();
                } else {
                    reject(new Error(data.error || "Error"));
                }
            };
            const script = document.createElement("script");
            script.src = `${SCRIPT_URL}?action=getAll&callback=${callbackName}`;
            script.onerror = () => {
                delete window[callbackName];
                reject(new Error("Error de red"));
            };
            document.body.appendChild(script);
        }).catch(err => {
            console.warn(err);
            loadFromLocal();
            refreshUI();
            showToast("⚠️ Usando datos locales", true);
        });
    }

    // Escritura con fetch (POST, modo no-cors)
    async function syncToCloud(silent = false) {
        if (!silent) showToast("🔄 Subiendo datos a la nube...", false);
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "syncAll", goats, notas: diaryNotes })
            });
            saveToLocal();
            if (!silent) showToast("✅ Datos guardados en Google Sheets", false);
        } catch (e) {
            console.error(e);
            if (!silent) showToast("❌ Error al sincronizar, datos solo locales", true);
        }
    }

    // Funciones de almacenamiento local
    function saveToLocal() {
        localStorage.setItem("molina_goats", JSON.stringify(goats));
        localStorage.setItem("molina_notes", diaryNotes);
    }
    function loadFromLocal() {
        goats = JSON.parse(localStorage.getItem("molina_goats") || "[]");
        diaryNotes = localStorage.getItem("molina_notes") || "";
    }

    // UI
    function refreshUI() {
        renderHerd();
        renderGenealogySelect();
        updateTreeAndCheese();
        updateDashboard();
        const notes = document.getElementById("learning-notes");
        if (notes) notes.value = diaryNotes;
    }

    function updateDashboard() {
        document.getElementById("total-goats").innerText = goats.length;
        const prod = goats.filter(g => g.milkL > 0);
        const avg = prod.length ? (prod.reduce((a,b)=>a+b.milkL,0)/prod.length).toFixed(1) : 0;
        document.getElementById("avg-milk").innerText = avg;
    }

    function renderHerd() {
        const grid = document.getElementById("herd-grid");
        if (!grid) return;
        if (goats.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-10 text-gray-500">Aún no hay cabras. ¡Agrega tu primera!</div>';
            return;
        }
        grid.innerHTML = goats.map(g => `
            <div class="bg-white rounded-xl shadow card-hover p-4 border">
                <div class="flex justify-between"><h3 class="font-poppins font-bold">${escapeHtml(g.name)}</h3><span class="text-xs bg-gray-100 px-2 rounded-full">${escapeHtml(g.breed || "Sin raza")}</span></div>
                <p class="text-sm"><i class="fas fa-tint"></i> ${g.milkL || 0} L/día</p>
                <p class="text-xs text-gray-500">Padre: ${escapeHtml(g.father || "—")} · Madre: ${escapeHtml(g.mother || "—")}</p>
                <button class="edit-goat text-primary text-sm" data-id="${g.id}">✏️ Editar</button>
                <button class="delete-goat text-red-500 text-sm ml-2" data-id="${g.id}">🗑️ Eliminar</button>
            </div>`).join("");
        document.querySelectorAll(".edit-goat").forEach(btn => btn.addEventListener("click", () => editGoat(btn.dataset.id)));
        document.querySelectorAll(".delete-goat").forEach(btn => btn.addEventListener("click", () => {
            goats = goats.filter(g => g.id !== btn.dataset.id);
            saveToLocal();
            syncToCloud(true);
            refreshUI();
        }));
    }

    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[m])); }

    function editGoat(id) {
        const goat = goats.find(g => g.id === id);
        if (!goat) return;
        document.getElementById("goat-name").value = goat.name;
        document.getElementById("goat-breed").value = goat.breed || "";
        document.getElementById("goat-father").value = goat.father || "";
        document.getElementById("goat-mother").value = goat.mother || "";
        document.getElementById("goat-milk").value = goat.milkL || 0;
        document.getElementById("goat-modal").style.display = "flex";
        const saveBtn = document.getElementById("save-goat");
        saveBtn.onclick = () => {
            goat.name = document.getElementById("goat-name").value;
            goat.breed = document.getElementById("goat-breed").value;
            goat.father = document.getElementById("goat-father").value;
            goat.mother = document.getElementById("goat-mother").value;
            goat.milkL = parseFloat(document.getElementById("goat-milk").value) || 0;
            saveToLocal();
            syncToCloud(true);
            refreshUI();
            document.getElementById("goat-modal").style.display = "none";
        };
    }

    function renderGenealogySelect() {
        const sel = document.getElementById("genealogy-select");
        if (sel) sel.innerHTML = goats.map(g => `<option value="${g.id}">${escapeHtml(g.name)}</option>`).join("");
    }

    function updateTreeAndCheese() {
        const id = document.getElementById("genealogy-select")?.value;
        if (!id) return;
        const goat = goats.find(g => g.id === id);
        if (!goat) return;
        const father = goats.find(g => g.name === goat.father);
        const mother = goats.find(g => g.name === goat.mother);
        document.getElementById("tree-container").innerHTML = `
            <div><strong>${escapeHtml(goat.name)}</strong> (${escapeHtml(goat.breed || "?")})<br>
            Padre: ${escapeHtml(father ? father.name : goat.father || "?")}<br>
            Madre: ${escapeHtml(mother ? mother.name : goat.mother || "?")}</div>`;
        document.getElementById("cheese-calc").innerHTML = `${goat.name} produce ${goat.milkL} L/día → ${(goat.milkL/8).toFixed(2)} kg queso/día.`;
    }

    function initModal() {
        if (document.getElementById("goat-modal")) return;
        const modal = document.createElement('div');
        modal.id = "goat-modal";
        modal.className = "fixed inset-0 bg-black/50 hidden items-center justify-center z-50";
        modal.innerHTML = `
            <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4">
                <h3 class="font-poppins text-xl mb-3">Registrar cabra</h3>
                <input type="text" id="goat-name" placeholder="Nombre" class="w-full border p-2 rounded mb-2">
                <input type="text" id="goat-breed" placeholder="Raza" class="w-full border p-2 rounded mb-2">
                <input type="text" id="goat-father" placeholder="Padre" class="w-full border p-2 rounded mb-2">
                <input type="text" id="goat-mother" placeholder="Madre" class="w-full border p-2 rounded mb-2">
                <input type="number" id="goat-milk" placeholder="Litros/día" class="w-full border p-2 rounded mb-2" step="0.1">
                <div class="flex justify-end gap-2"><button id="close-modal" class="px-4 py-2 border rounded">Cancelar</button><button id="save-goat" class="bg-primary text-white px-4 py-2 rounded">Guardar</button></div>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById("close-modal").onclick = () => modal.style.display = "none";
    }

    function bindEvents() {
        document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => {
            const view = btn.dataset.nav;
            document.querySelectorAll(".view").forEach(v => v.classList.add("hidden"));
            document.getElementById(`view-${view}`).classList.remove("hidden");
            if (view === "herd") renderHerd();
            if (view === "genealogy") { renderGenealogySelect(); updateTreeAndCheese(); }
            if (view === "notebook") document.getElementById("learning-notes").value = diaryNotes;
        }));
        document.getElementById("new-goat-btn").onclick = () => {
            document.getElementById("goat-name").value = "";
            document.getElementById("goat-breed").value = "";
            document.getElementById("goat-father").value = "";
            document.getElementById("goat-mother").value = "";
            document.getElementById("goat-milk").value = "";
            document.getElementById("goat-modal").style.display = "flex";
            document.getElementById("save-goat").onclick = () => {
                const newGoat = {
                    id: "g"+Date.now(),
                    name: document.getElementById("goat-name").value,
                    breed: document.getElementById("goat-breed").value,
                    father: document.getElementById("goat-father").value,
                    mother: document.getElementById("goat-mother").value,
                    milkL: parseFloat(document.getElementById("goat-milk").value) || 0
                };
                goats.push(newGoat);
                saveToLocal();
                syncToCloud(true);
                refreshUI();
                document.getElementById("goat-modal").style.display = "none";
            };
        };
        document.getElementById("save-notes").onclick = () => {
            diaryNotes = document.getElementById("learning-notes").value;
            saveToLocal();
            syncToCloud(true);
            showToast("📔 Notas guardadas", false);
        };
        document.getElementById("genealogy-select").onchange = updateTreeAndCheese;
        document.getElementById("syncBtn").onclick = () => syncToCloud(false);
    }

    (async () => {
        initModal();
        bindEvents();
        loadFromLocal();
        await loadFromCloud();
        refreshUI();
        setInterval(() => syncToCloud(true), 60000);
    })();
</script>
</body>
</html>
